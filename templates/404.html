{% extends "base.html" %}
{% load static %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<section class="notfound-section">
  <div>
    <span class="notfound__num">404</span>
    <h2 class="notfound__title">Page Not Found</h2>
    <p class="notfound__text">The page you're looking for doesn't exist or has been moved.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="{% url 'index' %}" class="btn-hvt btn-primary">Back to Home</a>
      <a href="{% url 'contact:contact_page' %}" class="btn-hvt btn-outline-white">Contact Us</a>
    </div>
  </div>
</section>
{% endblock %}
